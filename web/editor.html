<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Editor Pro</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel2:#1d222c;
      --line:#2a3140;
      --text:#e7ecf5;
      --muted:#9aa7bd;
      --accent:#2ea8ff;
      --danger:#ff5b6b;
      --ok:#19c37d;
    }

    *{ box-sizing:border-box; }
    html, body{ margin:0; height:100%; }
    body{ font-family: Inter, Segoe UI, Arial, sans-serif; background:var(--bg); color:var(--text); }

    .app{
      height:100vh;
      display:grid;
      grid-template-columns: 320px 1fr 300px;
      grid-template-rows: 1fr 240px;
      gap:1px;
      background:var(--line);
    }

    .panel{ background:var(--panel); }
    .left, .right{ padding:12px; overflow:auto; }

    .left h3, .right h3, .timeline h3{ margin:0 0 10px; font-size:13px; color:var(--muted); font-weight:600; }

    .bin{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
      align-content:start;
    }

    .clip-card{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px;
      cursor:pointer;
    }

    .clip-card video{
      width:100%;
      display:block;
      border-radius:8px;
      background:#000;
      aspect-ratio:16/9;
      object-fit:cover;
    }

    .clip-card .name{
      margin-top:6px;
      font-size:12px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .clip-card .meta{
      margin-top:2px;
      font-size:11px;
      color:var(--muted);
    }

    .center{
      display:grid;
      grid-template-rows: 50px 1fr;
      background:var(--panel);
    }

    .toolbar{
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      flex-wrap:wrap;
    }

    button{
      background:#263041;
      border:1px solid #34445e;
      color:var(--text);
      border-radius:8px;
      padding:8px 10px;
      cursor:pointer;
      font-size:12px;
    }

    button.primary{
      background:var(--accent);
      border-color:var(--accent);
      color:#001320;
      font-weight:600;
    }

    button.danger{
      background:var(--danger);
      border-color:var(--danger);
      color:#210005;
      font-weight:600;
    }

    .status{
      font-size:12px;
      color:var(--muted);
      margin-left:auto;
    }

    .status.ok{ color:var(--ok); }
    .status.err{ color:var(--danger); }

    .preview-wrap{
      display:grid;
      place-items:center;
      padding:14px;
    }

    #preview{
      width:min(100%, 960px);
      aspect-ratio:16/9;
      background:#000;
      border-radius:12px;
      border:1px solid var(--line);
    }

    .right .stack{ display:grid; gap:8px; }

    .label{ font-size:12px; color:var(--muted); }

    input[type="text"], input[type="number"]{
      width:100%;
      background:#111827;
      border:1px solid var(--line);
      color:var(--text);
      border-radius:8px;
      padding:8px;
      font-size:12px;
    }

    .timeline{
      grid-column:1 / span 3;
      background:var(--panel);
      padding:10px;
      overflow:auto;
    }

    .tracks{ display:grid; gap:8px; }

    .track{
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel2);
      padding:8px;
    }

    .lane{
      display:flex;
      gap:6px;
      overflow:auto;
      min-height:34px;
      padding-bottom:4px;
    }

    .seg{
      background:#2a3550;
      border:1px solid #39507b;
      border-radius:8px;
      padding:6px 10px;
      font-size:12px;
      white-space:nowrap;
      user-select:none;
      cursor:pointer;
    }

    .seg.disabled{
      opacity:0.4;
      text-decoration:line-through;
    }

    .seg.selected{
      outline:2px solid var(--accent);
    }

    .muted{ color:var(--muted); font-size:12px; }

    .font-preview{
      margin-top:6px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#0d1118;
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000;
    }

    .overlay-preview{
      margin-top:6px;
      padding:8px;
      border:1px dashed var(--line);
      border-radius:8px;
      background:#10141d;
      font-size:13px;
      color:#eaf0ff;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel left">
      <h3>Media Bin</h3>
      <div id="libraryInfo" class="muted" style="margin-bottom:10px;"></div>
      <div id="mediaBin" class="bin"></div>
    </aside>

    <main class="panel center">
      <div class="toolbar">
        <button id="btnAddFromSelection">Añadir clip seleccionado</button>
        <button id="btnMoveLeft">Mover izquierda</button>
        <button id="btnMoveRight">Mover derecha</button>
        <button id="btnToggle">Enable/Disable</button>
        <button id="btnDelete" class="danger">Eliminar</button>
        <button id="btnSave">Guardar timeline</button>
        <button id="btnRender" class="primary">Render final</button>
        <span id="status" class="status">Listo</span>
      </div>
      <div class="preview-wrap">
        <video id="preview" controls></video>
      </div>
    </main>

    <aside class="panel right">
      <h3>Inspector</h3>
      <div class="stack">
        <div>
          <div class="label">Clip</div>
          <input id="clipName" type="text" readonly />
        </div>
        <div>
          <div class="label">Ruta</div>
          <input id="clipPath" type="text" readonly />
        </div>
        <div>
          <div class="label">Inicio (s)</div>
          <input id="clipStart" type="number" step="0.1" min="0" />
        </div>
        <div>
          <div class="label">Duración (s)</div>
          <input id="clipDuration" type="number" step="0.1" min="1" />
        </div>
        <button id="btnApply">Aplicar cambios</button>

        <hr style="border:0;border-top:1px solid var(--line);margin:6px 0;" />
        <div class="label">Subtítulos · Fuente</div>
        <select id="subFont" style="width:100%;background:#111827;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px;font-size:12px;"></select>
        <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">
          <input id="fontSearch" type="text" placeholder="Buscar fuente moderna..." />
          <button id="btnFontSearch">Buscar</button>
        </div>
        <select id="fontCatalog" style="width:100%;background:#111827;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px;font-size:12px;"></select>
        <button id="btnInstallFont">Instalar fuente seleccionada</button>
        <div id="fontStatus" class="muted"></div>
        <div>
          <div class="label">Subtítulos · Tamaño</div>
          <input id="subFontSize" type="number" step="1" min="10" max="72" />
        </div>
        <div id="subFontPreview" class="font-preview">Previsualización de subtítulo</div>

        <hr style="border:0;border-top:1px solid var(--line);margin:6px 0;" />
        <div class="label">Texto incrustado (clip seleccionado)</div>
        <input id="ovText" type="text" placeholder="Ej: Consejo clave" />
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div>
            <div class="label">Desde (s)</div>
            <input id="ovStart" type="number" step="0.1" min="0" value="0" />
          </div>
          <div>
            <div class="label">Hasta (s)</div>
            <input id="ovEnd" type="number" step="0.1" min="0.1" value="2.5" />
          </div>
        </div>
        <button id="btnAddOverlay">Añadir texto al clip</button>
        <div id="ovPreview" class="overlay-preview">Previsualización de texto incrustado</div>
        <div id="overlayList" class="muted"></div>
      </div>
    </aside>

    <section class="panel timeline">
      <h3>Timeline</h3>
      <div class="tracks">
        <div class="track">
          <div class="label">V1</div>
          <div id="trackVideo" class="lane"></div>
        </div>
        <div class="track">
          <div class="label">A1</div>
          <div id="trackAudio" class="lane"></div>
        </div>
        <div class="track">
          <div class="label">S1</div>
          <div id="trackSubs" class="lane"></div>
        </div>
      </div>
    </section>
  </div>

<script>
  let timeline = {
    clips: [],
    library: [],
    audio: null,
    subtitles: null,
    target_minutes: 10,
    subtitle_style: {
      font_family: 'Arial',
      font_size: 18,
      primary_color: '&H00FFFFFF',
      outline_color: '&H00000000',
      outline: 2,
    },
    overlays: [],
  };

  let selectedLibraryPath = null;
  let selectedClipId = null;
  let dragClipId = null;
  let localFonts = [];
  let fontCatalog = [];

  const $ = (id) => document.getElementById(id);

  function setStatus(text, type = '') {
    const s = $('status');
    s.textContent = text;
    s.className = 'status ' + type;
  }

  function clipUrl(path) {
    return '/api/clip?path=' + encodeURIComponent(path);
  }

  async function loadTimeline() {
    const res = await fetch('/api/timeline');
    if (!res.ok) throw new Error(await res.text());
    timeline = await res.json();
    await loadFonts();
    renderAll();
  }

  async function loadFonts(search = '') {
    const [localRes, catalogRes] = await Promise.all([
      fetch('/api/fonts/local'),
      fetch('/api/fonts/catalog?limit=140')
    ]);

    const localData = localRes.ok ? await localRes.json() : { fonts: [] };
    const catalogData = catalogRes.ok ? await catalogRes.json() : { fonts: [] };

    localFonts = localData.fonts || [];
    const q = String(search || '').trim().toLowerCase();
    fontCatalog = (catalogData.fonts || []).filter(f => !q || String(f.family || '').toLowerCase().includes(q));

    renderFontSelectors();
  }

  function renderFontSelectors() {
    const fontSelect = $('subFont');
    const catalogSelect = $('fontCatalog');

    const uniqueFamilies = new Map();
    ['Arial', 'Segoe UI', 'Calibri'].forEach(f => uniqueFamilies.set(f, { family: f, file_path: '' }));
    localFonts.forEach(f => uniqueFamilies.set(f.family, f));

    fontSelect.innerHTML = '';
    [...uniqueFamilies.values()].forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.family;
      opt.textContent = f.file_path ? `${f.family} (local)` : f.family;
      opt.dataset.filePath = f.file_path || '';
      fontSelect.appendChild(opt);
    });

    catalogSelect.innerHTML = '';
    fontCatalog.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = `${f.family} · ${f.category || 'sans-serif'}`;
      opt.dataset.family = f.family;
      let preferredVariant = 'regular';
      const variants = Array.isArray(f.variants) ? f.variants : [];
      if (!variants.includes('regular') && variants.length) preferredVariant = variants[0];
      opt.dataset.variant = preferredVariant;
      catalogSelect.appendChild(opt);
    });

    const currentFamily = timeline.subtitle_style?.font_family || 'Arial';
    if ([...fontSelect.options].some(o => o.value === currentFamily)) {
      fontSelect.value = currentFamily;
    }
  }

  function getSelectedLocalFontFile() {
    const family = $('subFont').value;
    const found = localFonts.find(f => f.family === family);
    return found ? (found.file_path || '') : '';
  }

  async function installSelectedCatalogFont() {
    const sel = $('fontCatalog');
    const option = sel.options[sel.selectedIndex];
    if (!option) return;

    $('fontStatus').textContent = 'Instalando fuente...';
    const res = await fetch('/api/fonts/install', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: option.value,
        family: option.dataset.family,
        variant: option.dataset.variant || 'regular'
      })
    });

    if (!res.ok) {
      $('fontStatus').textContent = 'Error instalando fuente';
      return;
    }

    await loadFonts($('fontSearch').value || '');
    $('subFont').value = option.dataset.family;
    timeline.subtitle_style = timeline.subtitle_style || {};
    timeline.subtitle_style.font_family = option.dataset.family;
    timeline.subtitle_style.font_file = getSelectedLocalFontFile();
    $('fontStatus').textContent = `Fuente instalada: ${option.dataset.family}`;
    renderFontPreview();
  }

  function renderAll() {
    renderLibrary();
    renderTimeline();
    renderTracksMeta();
    syncInspector();
    renderOverlayList();
    renderFontPreview();
  }

  function renderLibrary() {
    const root = $('mediaBin');
    root.innerHTML = '';

    const lib = timeline.library || [];
    $('libraryInfo').textContent = `${lib.length} clips en biblioteca`;

    lib.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'clip-card';
      card.dataset.path = item.path;
      card.innerHTML = `
        <video muted preload="metadata" src="${clipUrl(item.path)}"></video>
        <div class="name">${item.name || item.path.split('\\').pop()}</div>
        <div class="meta">${Number(item.duration || 0).toFixed(1)}s</div>
      `;
      card.onclick = () => {
        selectedLibraryPath = item.path;
        $('preview').src = clipUrl(item.path);
      };
      card.ondblclick = () => addClipFromLibrary(item.path);
      root.appendChild(card);
    });
  }

  function renderTimeline() {
    const track = $('trackVideo');
    track.innerHTML = '';

    track.ondragover = (e) => {
      e.preventDefault();
    };

    (timeline.clips || []).forEach((clip, idx) => {
      const seg = document.createElement('div');
      seg.className = 'seg' + (clip.enabled ? '' : ' disabled') + (clip.id === selectedClipId ? ' selected' : '');
      seg.textContent = `${idx + 1}. ${clip.name || 'clip'} (${Number(clip.duration || 0).toFixed(1)}s)`;
      seg.draggable = true;
      seg.ondragstart = () => {
        dragClipId = clip.id;
      };
      seg.ondragover = (e) => {
        e.preventDefault();
      };
      seg.ondrop = (e) => {
        e.preventDefault();
        if (!dragClipId || dragClipId === clip.id) return;
        reorderClips(dragClipId, clip.id);
      };
      seg.onclick = () => {
        selectedClipId = clip.id;
        $('preview').src = clipUrl(clip.path) + `#t=${Number(clip.start || 0)},${Number(clip.start || 0) + Number(clip.duration || 4)}`;
        syncInspector();
        renderTimeline();
      };
      track.appendChild(seg);
    });
  }

  function reorderClips(sourceId, targetId) {
    const clips = timeline.clips || [];
    const sourceIndex = clips.findIndex(c => c.id === sourceId);
    const targetIndex = clips.findIndex(c => c.id === targetId);
    if (sourceIndex < 0 || targetIndex < 0 || sourceIndex === targetIndex) return;

    const [moved] = clips.splice(sourceIndex, 1);
    clips.splice(targetIndex, 0, moved);
    selectedClipId = moved.id;
    renderTimeline();
  }

  function renderTracksMeta() {
    const a = $('trackAudio');
    const s = $('trackSubs');
    a.innerHTML = '';
    s.innerHTML = '';

    if (timeline.audio && timeline.audio.path) {
      const el = document.createElement('div');
      el.className = 'seg';
      el.textContent = timeline.audio.name || 'voice';
      a.appendChild(el);
    }

    if (timeline.subtitles && timeline.subtitles.path) {
      const el = document.createElement('div');
      el.className = 'seg';
      el.textContent = timeline.subtitles.name || 'subtitles';
      s.appendChild(el);
    }
  }

  function getSelectedClip() {
    return (timeline.clips || []).find(c => c.id === selectedClipId);
  }

  function syncInspector() {
    const clip = getSelectedClip();
    $('clipName').value = clip ? (clip.name || '') : '';
    $('clipPath').value = clip ? (clip.path || '') : '';
    $('clipStart').value = clip ? Number(clip.start || 0) : 0;
    $('clipDuration').value = clip ? Number(clip.duration || 4) : 4;

    timeline.subtitle_style = timeline.subtitle_style || {};
    $('subFont').value = timeline.subtitle_style.font_family || 'Arial';
    $('subFontSize').value = Number(timeline.subtitle_style.font_size || 18);
    timeline.subtitle_style.font_file = timeline.subtitle_style.font_file || getSelectedLocalFontFile();
    renderFontPreview();
  }

  function renderFontPreview() {
    const style = timeline.subtitle_style || {};
    const font = $('subFont')?.value || style.font_family || 'Arial';
    const size = Math.max(10, Number($('subFontSize')?.value || style.font_size || 18));
    const fontFile = getSelectedLocalFontFile();
    if (fontFile) {
      const encoded = encodeURIComponent(fontFile.split('\\').pop());
      const styleId = 'dynamic-font-preview-style';
      let styleEl = document.getElementById(styleId);
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = styleId;
        document.head.appendChild(styleEl);
      }
      styleEl.textContent = `@font-face { font-family: "Preview-${font}"; src: url('/fonts/${encoded}') format('truetype'); }`;
    }

    const previewFamily = fontFile ? `Preview-${font}` : font;
    const sample = $('subFontPreview');
    if (sample) {
      sample.style.fontFamily = `'${previewFamily}', '${font}', Arial, sans-serif`;
      sample.style.fontSize = `${size}px`;
      sample.textContent = 'Esto es una previsualización de subtítulo';
    }

    const overlayInput = String($('ovText')?.value || '').trim();
    const overlaySample = $('ovPreview');
    if (overlaySample) {
      overlaySample.style.fontFamily = `'${previewFamily}', '${font}', Arial, sans-serif`;
      overlaySample.textContent = overlayInput || 'Previsualización de texto incrustado';
    }
  }

  function renderOverlayList() {
    const root = $('overlayList');
    const selected = getSelectedClip();
    if (!selected) {
      root.textContent = 'Selecciona un clip para ver/editar textos.';
      return;
    }

    const overlays = (timeline.overlays || []).filter(o => o.clip_id === selected.id);
    if (!overlays.length) {
      root.textContent = 'Sin textos en este clip.';
      return;
    }

    root.innerHTML = overlays
      .map(o => `• [${Number(o.start).toFixed(1)}-${Number(o.end).toFixed(1)}s] ${o.text}`)
      .join('<br>');
  }

  function addClipFromLibrary(path) {
    const libItem = (timeline.library || []).find(x => x.path === path);
    if (!libItem) return;

    const id = (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now() + Math.random());
    timeline.clips = timeline.clips || [];
    timeline.clips.push({
      id,
      name: libItem.name || libItem.path.split('\\').pop(),
      path: libItem.path,
      start: 0,
      duration: Math.max(1, Math.min(Number(libItem.duration || 4), 8)),
      enabled: true,
    });
    selectedClipId = id;
    renderAll();
  }

  function moveSelected(delta) {
    const clips = timeline.clips || [];
    const i = clips.findIndex(c => c.id === selectedClipId);
    if (i < 0) return;
    const j = i + delta;
    if (j < 0 || j >= clips.length) return;
    [clips[i], clips[j]] = [clips[j], clips[i]];
    renderTimeline();
  }

  function toggleSelected() {
    const clip = getSelectedClip();
    if (!clip) return;
    clip.enabled = !clip.enabled;
    renderTimeline();
  }

  function deleteSelected() {
    const clips = timeline.clips || [];
    const i = clips.findIndex(c => c.id === selectedClipId);
    if (i < 0) return;
    clips.splice(i, 1);
    selectedClipId = clips.length ? clips[Math.max(0, i - 1)].id : null;
    renderAll();
  }

  function applyInspectorChanges() {
    const clip = getSelectedClip();
    if (!clip) return;
    clip.start = Math.max(0, Number($('clipStart').value || 0));
    clip.duration = Math.max(1, Number($('clipDuration').value || 4));

    timeline.subtitle_style = timeline.subtitle_style || {};
    timeline.subtitle_style.font_family = $('subFont').value || 'Arial';
    timeline.subtitle_style.font_file = getSelectedLocalFontFile();
    timeline.subtitle_style.font_size = Math.max(10, Number($('subFontSize').value || 18));

    renderTimeline();
    renderOverlayList();
    renderFontPreview();
    setStatus('Cambios aplicados', 'ok');
  }

  function addOverlayToSelectedClip() {
    const clip = getSelectedClip();
    if (!clip) {
      setStatus('Selecciona un clip primero', 'err');
      return;
    }

    const text = String($('ovText').value || '').trim();
    const start = Math.max(0, Number($('ovStart').value || 0));
    const end = Math.max(start + 0.1, Number($('ovEnd').value || 0));

    if (!text) {
      setStatus('Escribe un texto para incrustar', 'err');
      return;
    }

    timeline.overlays = timeline.overlays || [];
    timeline.overlays.push({
      id: (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now() + Math.random()),
      clip_id: clip.id,
      text,
      start,
      end,
      x: '(w-text_w)/2',
      y: 'h-160',
      font_size: 44,
      font_color: 'white',
      box: 1,
      box_color: 'black@0.45',
      relative: true,
    });

    $('ovText').value = '';
    renderOverlayList();
    renderFontPreview();
    setStatus('Texto añadido al clip', 'ok');
  }

  async function saveTimeline() {
    setStatus('Guardando...');
    const payload = {
      ...timeline,
      clips: (timeline.clips || []).map(c => ({
        id: c.id,
        name: c.name,
        path: c.path,
        start: Number(c.start || 0),
        duration: Number(c.duration || 4),
        enabled: Boolean(c.enabled),
      })),
    };

    const res = await fetch('/api/timeline', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      setStatus('Error al guardar timeline', 'err');
      return;
    }

    setStatus('Timeline guardado', 'ok');
  }

  async function renderFinal() {
    await saveTimeline();
    setStatus('Renderizando...');
    const res = await fetch('/api/render', { method: 'POST' });
    if (!res.ok) {
      const txt = await res.text();
      setStatus('Error de render: ' + txt, 'err');
      return;
    }
    const data = await res.json();
    setStatus('Render final listo: ' + (data.out_path || ''), 'ok');
  }

  $('btnAddFromSelection').onclick = () => {
    if (!selectedLibraryPath && timeline.library?.length) {
      selectedLibraryPath = timeline.library[0].path;
    }
    if (selectedLibraryPath) addClipFromLibrary(selectedLibraryPath);
  };
  $('btnMoveLeft').onclick = () => moveSelected(-1);
  $('btnMoveRight').onclick = () => moveSelected(1);
  $('btnToggle').onclick = toggleSelected;
  $('btnDelete').onclick = deleteSelected;
  $('btnApply').onclick = applyInspectorChanges;
  $('btnAddOverlay').onclick = addOverlayToSelectedClip;
  $('btnSave').onclick = saveTimeline;
  $('btnRender').onclick = renderFinal;
  $('btnInstallFont').onclick = installSelectedCatalogFont;
  $('btnFontSearch').onclick = () => loadFonts($('fontSearch').value || '');
  $('subFont').addEventListener('input', renderFontPreview);
  $('subFontSize').addEventListener('input', renderFontPreview);
  $('ovText').addEventListener('input', renderFontPreview);

  loadTimeline().catch((err) => {
    setStatus('Error al cargar: ' + err.message, 'err');
  });
</script>
</body>
</html>
